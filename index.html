<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Book Vibe Search</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; max-width: 800px; }
        h1 { color: #2c3e50; text-align: center; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 24px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .book-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; transition: transform 0.2s; }
        .book-card:hover { transform: translateY(-5px); }
        .book-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .book-card h3 { font-size: 16px; margin: 10px 0 5px; color: #333; height: 40px; overflow: hidden; }
        .book-card p { font-size: 14px; color: #777; margin: 0; }
        #loader { display: none; text-align: center; margin: 20px; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Book Vibe Assistant</h1>
    <div class="search-box">
        <input type="text" id="vibeInput" placeholder="Describe the vibe (e.g., 'A dark space mystery with a twist')">
        <button onclick="getRecommendations()">Find Books</button>
    </div>

    <div id="loader">Consulting the AI...</div>
    <div id="bookList" class="book-list"></div>
</div>

<script>
    async function getRecommendations() {
        const vibe = document.getElementById('vibeInput').value;
        const bookList = document.getElementById('bookList');
        const loader = document.getElementById('loader');

        if (!vibe) {
            alert("Please enter a vibe first!");
            return;
        }

        // Clear previous results and show loader
        bookList.innerHTML = '';
        loader.style.display = 'block';

        try {
            const response = await fetch('http://127.0.0.1:5001/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vibe: vibe })
            });

            const data = await response.json();
            loader.style.display = 'none';

            if (data.length === 0) {
                bookList.innerHTML = '<p>No books found for that vibe. Try something else!</p>';
                return;
            }

            // Create cards for each book
            data.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <img src="${book.image_url}" onerror="this.src='https://via.placeholder.com/150x225?text=No+Cover'" alt="Book Cover">
                    <h3>${book.title}</h3>
                    <p>By ${book.author}</p>
                `;
                bookList.appendChild(card);
            });

        } catch (error) {
            loader.style.display = 'none';
            alert("Error connecting to AI Server. Make sure app.py is running!");
            console.error(error);
        }
    }
</script>

</body>
</html>
